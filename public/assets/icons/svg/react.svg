<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="36" fill="url(#bg)" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- React atom orbits -->
  <ellipse cx="40" cy="40" rx="22" ry="9" stroke="url(#g1)" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="40" cy="40" rx="22" ry="9" stroke="url(#g1)" stroke-width="2" opacity="0.9" transform="rotate(60 40 40)" filter="url(#glow)"/>
  <ellipse cx="40" cy="40" rx="22" ry="9" stroke="url(#g1)" stroke-width="2" opacity="0.9" transform="rotate(120 40 40)" filter="url(#glow)"/>
  <!-- Center nucleus -->
  <circle cx="40" cy="40" r="4" fill="url(#g1)" filter="url(#glow)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a1040"/><stop offset="100%" stop-color="#0d0d1a"/></radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/></linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
