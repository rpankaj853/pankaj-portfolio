<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="36" fill="url(#bg)" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- GraphQL hexagon nodes -->
  <circle cx="40" cy="20" r="4" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="57" cy="30" r="4" fill="url(#g1)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="57" cy="50" r="4" fill="url(#g1)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="40" cy="60" r="4" fill="url(#g1)" filter="url(#glow)" opacity="0.7"/>
  <circle cx="23" cy="50" r="4" fill="url(#g1)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="23" cy="30" r="4" fill="url(#g1)" filter="url(#glow)" opacity="0.9"/>
  <!-- Edges -->
  <polygon points="40,20 57,30 57,50 40,60 23,50 23,30" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <!-- Cross lines -->
  <line x1="40" y1="20" x2="57" y2="50" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>
  <line x1="40" y1="20" x2="23" y2="50" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>
  <line x1="57" y1="30" x2="23" y2="50" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>
  <line x1="57" y1="30" x2="40" y2="60" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>
  <line x1="23" y1="30" x2="57" y2="50" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>
  <line x1="23" y1="30" x2="40" y2="60" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a1040"/><stop offset="100%" stop-color="#0d0d1a"/></radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/></linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
