<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="36" fill="url(#bg)" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- Redux circular arrows -->
  <path d="M40 20 C52 20 62 29 62 40" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <path d="M62 40 C62 51 53 60 42 60" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.85"/>
  <path d="M38 60 C27 58 18 50 18 40 C18 30 26 22 36 20" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.7"/>
  <!-- Arrowheads -->
  <polyline points="58,36 62,40 66,36" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="34,63 38,60 34,57" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  <polyline points="19,44 18,40 22,38" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <!-- Center -->
  <circle cx="40" cy="40" r="5" fill="url(#g1)" filter="url(#glow)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a1040"/><stop offset="100%" stop-color="#0d0d1a"/></radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/></linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
