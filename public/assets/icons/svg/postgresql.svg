<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="36" fill="url(#bg)" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- Elephant head shape (simplified) -->
  <ellipse cx="40" cy="36" rx="16" ry="14" fill="url(#g1)" opacity="0.15"/>
  <ellipse cx="40" cy="36" rx="16" ry="14" stroke="url(#g1)" stroke-width="2" filter="url(#glow)"/>
  <!-- Trunk -->
  <path d="M53 36 C58 36 60 40 58 46 C56 50 53 50 53 46" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="34" cy="32" r="2.5" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="44" cy="32" r="2.5" fill="url(#g1)" filter="url(#glow)"/>
  <!-- Ears -->
  <path d="M26 28 C20 22 18 30 24 34" stroke="url(#g1)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Tusks / teeth -->
  <path d="M34 48 L32 54" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M46 48 L48 54" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a1040"/><stop offset="100%" stop-color="#0d0d1a"/></radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/></linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
