<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="36" fill="url(#bg)" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- API brackets -->
  <path d="M26 26 L20 40 L26 54" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <path d="M54 26 L60 40 L54 54" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" opacity="0.7"/>
  <!-- REST text via lines -->
  <line x1="33" y1="34" x2="47" y2="34" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="33" y1="40" x2="44" y2="40" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="33" y1="46" x2="47" y2="46" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a1040"/><stop offset="100%" stop-color="#0d0d1a"/></radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/></linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
